<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>踏莎行</title>
  <meta name="description" content="东方仙侠世界观设定集合站" />

  <style>
    :root{
      /* 调高了背景基础亮度 */
      --bg0:#0f141d; 
      --gold:#e2c68a;
      --jade:#a8ccbe;
      /* 提升线条透明度使其更亮 */
      --line:rgba(255,255,255,.25);
      --line2:rgba(255,255,255,.18);
      --text:rgba(255,255,255,1);
      --muted:rgba(255,255,255,.85);
      --shadow: 0 20px 60px rgba(0,0,0,.3);
      --radius: 22px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      color:var(--text);
      /* 调整渐变色权重，增加光晕亮度 */
      background:
        radial-gradient(1000px 700px at 15% 0%, rgba(143,184,168,.20), transparent 60%),
        radial-gradient(1000px 700px at 85% 10%, rgba(214,179,106,.20), transparent 65%),
        linear-gradient(180deg, var(--bg0), #131821 60%, #131821);
      /* 字体修改：将宋体类字体排在最前面 */
      font-family: "Songti SC", "STSong", "Noto Serif SC", "Source Han Serif SC", "SimSun", "新宋体", serif;
      overflow-x:hidden;
    }
    a{ color:inherit; text-decoration:none; }

    /* ===== Hero background texture ===== */
    .hero{
      position:relative;
      min-height: 92vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 18px 42px;
    }
    .hero::before{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(1200px 520px at 50% 20%, rgba(255,255,255,.15), transparent 65%),
        radial-gradient(900px 420px at 20% 70%, rgba(143,184,168,.12), transparent 60%),
        radial-gradient(900px 420px at 85% 75%, rgba(214,179,106,.12), transparent 60%),
        linear-gradient(180deg, rgba(15,20,29,.4), rgba(15,20,29,.6)),
        url("assets/img/texture.jpg");
      background-size: auto, auto, auto, auto, 900px;
      background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, repeat;
      background-position: center, center, center, center, center;
      filter: contrast(100%) saturate(100%);
    }

    /* ===== Glass frame ===== */
    .frame{
      position:relative;
      width:min(1080px, 100%);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: calc(var(--radius) + 10px);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      /* 提高面板背景亮度 */
      background: rgba(255,255,255,.08); 
      overflow:hidden;
    }

    .corner{
      position:absolute;
      width: 90px; height: 90px;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 18px;
      opacity:.6;
      pointer-events:none;
    }
    .corner.tl{ top:14px; left:14px; border-right:none; border-bottom:none; }
    .corner.tr{ top:14px; right:14px; border-left:none; border-bottom:none; }
    .corner.bl{ bottom:14px; left:14px; border-right:none; border-top:none; }
    .corner.br{ bottom:14px; right:14px; border-left:none; border-top:none; }

    .inner{
      position:relative;
      padding: 46px 26px 34px;
      display:grid;
      gap: 20px;
    }

    /* ===== Top bar ===== */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      background: rgba(255,255,255,.12);
    }
    .mark{
      display:flex; align-items:center; gap:10px;
      padding-left:6px; min-width:0;
    }
    .seal{
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.4);
      background:
        radial-gradient(circle at 30% 30%, rgba(214,179,106,.40), transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(143,184,168,.35), transparent 55%),
        rgba(255,255,255,.1);
      box-shadow: 0 5px 15px rgba(0,0,0,.2);
      display:grid; place-items:center;
    }
    .markText b{
      letter-spacing:.20em;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }
    .markText small{
      display:block;
      margin-top:3px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing:.10em;
    }

    .nav{
      display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;
    }
    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: var(--muted);
      font-size: 12px;
      letter-spacing:.08em;
      transition: all .2s ease;
    }
    .pill:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.15);
      border-color: rgba(255,255,255,.4);
      color: #fff;
    }

    /* ===== Title block ===== */
    .titleBlock{ text-align:center; padding: 10px 8px 0; }
    .mainTitle{
      margin: 10px 0 8px;
      font-size: clamp(44px, 6vw, 72px);
      letter-spacing:.25em;
      font-weight: 800;
      /* 强制标题使用宋体 */
      font-family: "Songti SC", "STSong", serif;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,.2);
    }
    .subTitle{
      margin:0;
      color: var(--muted);
      letter-spacing: .22em;
      font-size: 13px;
    }
    .divider{
      margin: 18px auto 0;
      width: min(620px, 92%);
      display:flex;
      align-items:center;
      gap:14px;
      color: rgba(255,255,255,.6);
    }
    .divider::before,
    .divider::after{
      content:"";
      height:1px;
      flex:1;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
    }

    /* ===== Portals ===== */
    .portals{
      margin-top: 18px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 6px 6px 0;
    }
    .portal{
      border: 1px solid rgba(255,255,255,.2);
      border-radius: var(--radius);
      background: rgba(255,255,255,.05);
      overflow:hidden;
      position:relative;
      transition: all .2s ease;
      min-height: 260px;
    }
    .portal:hover{
      transform: translateY(-3px);
      border-color: rgba(255,255,255,.4);
      background: rgba(255,255,255,.1);
    }

    .portalTop{
      position:relative;
      height: 118px;
      overflow:hidden;
      border-bottom: 1px solid rgba(255,255,255,.15);
    }
    .portalTop::before{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.4));
      z-index:1;
    }

    .halo{
      position:absolute;
      width: 86px; height: 86px;
      border-radius:50%;
      left:50%; top:80px;
      transform:translate(-50%, -50%);
      background: rgba(30,35,45,.95); /* 稍微调亮光圈底色 */
      border: 1px solid rgba(255,255,255,.5);
      box-shadow: 0 8px 25px rgba(0,0,0,.3);
      z-index:2;
      display:grid; place-items:center;
    }

    .portalBody{
      padding: 52px 16px 16px;
      text-align:center;
    }
    .portalBody h3{
      margin:0;
      font-size: 18px;
      letter-spacing:.22em;
      font-weight: 800;
      color: #fff;
    }
    .portalBody p{
      margin: 10px auto 0;
      max-width: 30ch;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .go{
      margin-top: 14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 12px;
      transition: all .2s ease;
    }

    /* ===== Updates ===== */
    .updates{
      margin-top: 18px;
      border-top: 1px solid rgba(255,255,255,.15);
      padding-top: 16px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .panel{
      border: 1px solid rgba(255,255,255,.2);
      border-radius: var(--radius);
      background: rgba(255,255,255,.08);
      padding: 14px 14px 12px;
    }
    .panel h4{
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: .18em;
      color: #fff;
      font-weight: 800;
    }
    
    .linkRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.05);
      transition: all .15s ease;
    }
    .linkRow:hover{
      border-color: rgba(255,255,255,.4);
      background: rgba(255,255,255,.12);
    }

    @media (max-width: 760px){
      .portals{ grid-template-columns: 1fr; }
      .nav{ display:none; }
    }
  </style>
</head>

<body>
  <main class="hero">
    <div class="frame">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>

      <div class="inner">
        <div class="topbar">
          <div class="mark">
            <div class="seal">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M12 2l2.2 6.2L21 10l-5 3.7L17.8 20 12 16.7 6.2 20 8 13.7 3 10l6.8-1.8L12 2z" stroke="#fff" stroke-width="1.5" />
              </svg>
            </div>
            <div class="markText">
              <b>踏莎行</b>
              <small>仙侠世界观设定集合站</small>
            </div>
          </div>
          <nav class="nav">
            <a class="pill" href="log/index.html">日志</a>
            <a class="pill" href="nav/index.html">导航</a>
            <a class="pill" href="about/index.html">说明</a>
          </nav>
        </div>

        <section class="titleBlock">
          <h1 class="mainTitle">踏莎行</h1>
          <p class="subTitle">— 欢迎来到东方仙侠世界观设定集合站 —</p>
          <div class="divider"><span>流水落花春去也，天上人间</span></div>
        </section>

        <section class="portals">
          <a class="portal world" href="world/index.html">
            <div class="portalTop" style="background: url('assets/img/portal-world.jpg') center/cover;"></div>
            <div class="halo">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff"><circle cx="12" cy="12" r="10" stroke-width="1.2"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20" stroke-width="1.2"/></svg>
            </div>
            <div class="portalBody">
              <h3>世界观</h3>
              <p>包含世界观下的基本设定信息、势力介绍、名词解释等。</p>
              <span class="go">进入 · World</span>
            </div>
          </a>

          <a class="portal characters" href="characters/index.html">
            <div class="portalTop" style="background: url('assets/img/portal-characters.jpg') center/cover;"></div>
            <div class="halo">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="1.2"/><circle cx="12" cy="7" r="4" stroke-width="1.2"/></svg>
            </div>
            <div class="portalBody">
              <h3>人物</h3>
              <p>包含人物设定、关系网等。</p>
              <span class="go">进入 · Characters</span>
            </div>
          </a>

          <a class="portal other" href="other/index.html">
            <div class="portalTop" style="background: url('assets/img/portal-other.jpg') center/cover;"></div>
            <div class="halo">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke-width="1.2"/></svg>
            </div>
            <div class="portalBody">
              <h3>其他</h3>
              <p>小故事、碎碎念和堆一些稿件。</p>
              <span class="go">进入 · Other</span>
            </div>
          </a>
        </section>

        <section class="updates">
          <div class="panel">
            <h4>最新更新</h4>
            <p>【新增】：框架亮度与字体优化</p>
          </div>
          <div class="panel">
            <h4>便捷入口</h4>
            <div style="display:grid; gap:8px; margin-top:8px;">
              <a class="linkRow" href="gallery/index.html"><span>画廊</span><em>Gallery</em></a>
              <a class="linkRow" href="characters/quick.html"><span>人物速查</span><em>Quick</em></a>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>
</body>
</html>
