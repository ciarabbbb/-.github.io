<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>几度春秋</title>

<style>

/* =====================
   全站统一宋体
===================== */

*{
  font-family: "Songti SC","STSong","SimSun","NSimSun",serif !important;
}

body{
  margin:0;
  background:#0b0f16;
  color:#f2f2f2;
}

/* =====================
   你原本页面样式（简化）
===================== */

.hero{
  padding:60px 20px;
  text-align:center;
}

.mainTitle{
  font-size:56px;
  letter-spacing:.25em;
  margin-bottom:10px;
}

.subTitle{
  opacity:.7;
  letter-spacing:.2em;
}

.section{
  margin-top:60px;
}

/* =====================
   小游戏样式
===================== */

#gameWrapper{
  margin-top:80px;
  padding:40px 0 80px;
  text-align:center;
  border-top:1px solid rgba(255,255,255,.15);
}

#gameCanvas{
  background:#111;
  border:1px solid rgba(255,255,255,.2);
  display:block;
  margin:20px auto;
}

#score{
  margin-top:10px;
  opacity:.8;
}

</style>
</head>

<body>

<div class="hero">
  <div class="mainTitle">几度春秋</div>
  <div class="subTitle">— 流水落花春去也，天上人间 —</div>
</div>

<!-- =====================
     小游戏区域
===================== -->

<div id="gameWrapper">
  <h2>人间小试</h2>
  <p>按 空格键 跳跃 · 躲避劫难</p>
  <canvas id="gameCanvas" width="600" height="200"></canvas>
  <div id="score">得分：0</div>
</div>

<script>

/* =====================
   极简恐龙式小游戏
===================== */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
  x:50,
  y:150,
  width:20,
  height:20,
  velocityY:0,
  jumping:false
};

let gravity = 0.6;
let obstacle = {
  x:600,
  y:160,
  width:20,
  height:40
};

let score = 0;
let gameOver = false;

function drawPlayer(){
  ctx.fillStyle = "white";
  ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawObstacle(){
  ctx.fillStyle = "#d6b36a";
  ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
}

function update(){
  if(gameOver) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 重力
  player.velocityY += gravity;
  player.y += player.velocityY;

  if(player.y >= 150){
    player.y = 150;
    player.jumping = false;
  }

  // 障碍移动
  obstacle.x -= 5;
  if(obstacle.x < -20){
    obstacle.x = 600;
    score++;
    document.getElementById("score").innerText = "得分：" + score;
  }

  // 碰撞检测
  if(
    player.x < obstacle.x + obstacle.width &&
    player.x + player.width > obstacle.x &&
    player.y < obstacle.y + obstacle.height &&
    player.y + player.height > obstacle.y
  ){
    gameOver = true;
    document.getElementById("score").innerText += " · 劫难已至";
  }

  drawPlayer();
  drawObstacle();

  requestAnimationFrame(update);
}

document.addEventListener("keydown",function(e){
  if(e.code === "Space" && !player.jumping){
    player.velocityY = -10;
    player.jumping = true;
  }
});

update();

</script>

</body>
</html>
