<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>人物 · 几度春秋</title>
  <meta name="description" content="OC 人物设定集合" />

  <style>
    :root{
      --bg0:#070a10;
      --gold:#d6b36a;
      --jade:#8fb8a8;
      --line2:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.72);
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --radius: 20px;
    }
    *{ box-sizing:border-box; }
    html, body{
      height:100%;
      font-family: "Songti SC","STSong","SimSun","NSimSun",serif !important;
    }
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 15% 0%, rgba(143,184,168,.12), transparent 55%),
        radial-gradient(900px 600px at 85% 10%, rgba(214,179,106,.12), transparent 58%),
        linear-gradient(180deg, var(--bg0), #06070b 60%, #06070b);
      overflow-x:hidden;
    }
    a{ color:inherit; text-decoration:none; }

    /* Top bar */
    .wrap{
      width:min(1100px, 100%);
      margin: 0 auto;
      padding: 22px 16px 50px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      box-shadow: 0 18px 50px rgba(0,0,0,.30);
      backdrop-filter: blur(10px);
    }
    .left{
      display:flex; align-items:center; gap:10px; min-width:0;
    }
    .seal{
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 30% 30%, rgba(214,179,106,.30), transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(143,184,168,.24), transparent 55%),
        rgba(255,255,255,.05);
      display:grid; place-items:center;
      flex: 0 0 auto;
    }
    .title{
      line-height:1.1; min-width:0;
    }
    .title b{
      letter-spacing:.20em;
      font-size: 13px;
      font-weight: 800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:block;
    }
    .title small{
      display:block;
      margin-top:3px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing:.10em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap: wrap;
      justify-content:flex-end;
      align-items:center;
    }
    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 12px;
      letter-spacing:.08em;
      cursor:pointer;
      user-select:none;
      transition: transform .15s ease, background .15s ease, border-color .15s ease, color .15s ease;
    }
    .pill:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.07);
      border-color: rgba(255,255,255,.22);
      color: var(--text);
    }

    /* Header */
    .header{
      text-align:center;
      padding: 20px 6px 0;
    }
    .header h1{
      margin: 18px 0 8px;
      font-size: clamp(34px, 5vw, 56px);
      letter-spacing: .22em;
      font-weight: 900;
      text-shadow:
        0 0 18px rgba(214,179,106,.14),
        0 20px 60px rgba(0,0,0,.55);
    }
    .header p{
      margin:0;
      color: var(--muted);
      letter-spacing: .18em;
      font-size: 13px;
      line-height: 1.9;
    }
    .divider{
      margin: 18px auto 0;
      width: min(720px, 92%);
      display:flex;
      align-items:center;
      gap:14px;
      color: rgba(255,255,255,.55);
    }
    .divider::before,
    .divider::after{
      content:"";
      height:1px;
      flex:1;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.26), transparent);
    }
    .divider span{
      font-size: 12px;
      letter-spacing:.18em;
      opacity:.92;
      white-space:nowrap;
    }

    /* Grid */
    .grid{
      margin-top: 18px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 980px){ .grid{ grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 720px){ .grid{ grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 420px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      border: 1px solid rgba(255,255,255,.14);
      border-radius: var(--radius);
      background: rgba(10,12,18,.40);
      overflow:hidden;
      box-shadow: 0 14px 40px rgba(0,0,0,.25);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
      position:relative;
      min-height: 230px;
      cursor: pointer;
    }
    .card:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.24);
      background: rgba(10,12,18,.55);
    }
    .card.add-card {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,12,18,.25);
      border-style: dashed;
    }
    .card.add-card .add-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: rgba(255,255,255,.6);
      transition: all .2s ease;
    }
    .card.add-card:hover .add-icon {
      color: rgba(255,255,255,.9);
      border-color: rgba(255,255,255,.6);
      transform: scale(1.1);
    }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,120,120,.15);
      border: 1px solid rgba(255,120,120,.3);
      color: rgba(255,120,120,.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      z-index: 10;
      opacity: 0;
      transition: all .2s ease;
    }
    .card:not(.add-card):hover .delete-btn {
      opacity: 1;
    }
    .delete-btn:hover {
      background: rgba(255,120,120,.25);
      border-color: rgba(255,120,120,.5);
      color: rgba(255,120,120,1);
    }
    .thumb{
      height: 160px;
      position:relative;
      background: rgba(255,255,255,.06);
      overflow:hidden;
    }
    .thumb img{
      width:100%; height:100%;
      object-fit:cover;
      display:block;
      filter: saturate(95%) contrast(105%);
      transform: scale(1.03);
    }
    .thumb::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,.00), rgba(0,0,0,.60));
      pointer-events:none;
    }
    .name{
      padding: 12px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .name b{
      letter-spacing:.18em;
      font-size: 14px;
      font-weight: 900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .poem {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }
    .tag{
      font-size: 11px;
      letter-spacing:.10em;
      color: rgba(255,255,255,.70);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      padding: 6px 10px;
      border-radius: 999px;
      white-space:nowrap;
      flex: 0 0 auto;
    }

    /* Admin panel */
    .panel{
      margin-top: 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius);
      background: rgba(255,255,255,.04);
      padding: 14px;
      display:none;
    }
    .panel.show{ display:block; }
    .panelTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .panelTop h2{
      margin:0;
      font-size: 13px;
      letter-spacing: .18em;
      font-weight: 900;
      color: rgba(255,255,255,.92);
    }
    .panelTop p{
      margin:0;
      color: rgba(255,255,255,.60);
      font-size: 12px;
      letter-spacing:.10em;
      line-height: 1.7;
    }
    .form{
      margin-top: 12px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 820px){
      .form{ grid-template-columns: 1fr; }
    }
    .field{
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      background: rgba(10,12,18,.35);
      padding: 10px 10px 8px;
    }
    .field label{
      display:block;
      font-size: 11px;
      color: rgba(255,255,255,.70);
      letter-spacing:.12em;
      margin-bottom: 6px;
    }
    .field input, .field select{
      width:100%;
      background: transparent;
      border: none;
      outline:none;
      color: rgba(255,255,255,.92);
      font-size: 13px;
      letter-spacing:.08em;
      font-family: inherit;
    }
    .field.poem-field {
      grid-column: 1 / -1;
    }
    .rowBtns{
      display:flex;
      gap:8px;
      flex-wrap: wrap;
      align-items:center;
      justify-content:flex-start;
      margin-top: 10px;
    }
    .btn{
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.90);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      letter-spacing:.10em;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.24);
    }
    .danger{
      border-color: rgba(255,120,120,.25);
      background: rgba(255,120,120,.06);
    }
    .danger:hover{
      border-color: rgba(255,120,120,.40);
      background: rgba(255,120,120,.10);
    }

    .mini{
      margin-top: 10px;
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      align-items:center;
      justify-content:space-between;
      border-top: 1px solid rgba(255,255,255,.10);
      padding-top: 10px;
    }
    .mini span{
      color: rgba(255,255,255,.65);
      font-size: 12px;
      letter-spacing:.08em;
      line-height: 1.7;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-size: 11px;
      color: rgba(255,255,255,.60);
      letter-spacing: .04em;
    }
    
    /* 导出按钮样式 */
    .export-btn {
      margin-left: 8px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="left">
        <div class="seal" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 2l2.2 6.2L21 10l-5 3.7L17.8 20 12 16.7 6.2 20 8 13.7 3 10l6.8-1.8L12 2z"
              stroke="rgba(255,255,255,.85)" stroke-width="1.2" />
          </svg>
        </div>
        <div class="title">
          <b>人物</b>
          <small>设定 | 小传 | 立绘 | 关系网 </small>
        </div>
      </div>

      <div class="actions">
        <a class="pill" href="../index.html">返回首页</a>
        <button class="pill" id="btnToggleAdmin" type="button">管理</button>
        <button class="pill export-btn" id="btnExport" type="button">导出数据</button>
      </div>
    </div>

    <header class="header">
      <h1>人物合集</h1>
      <p id="headerDesc">点击跳转至人物详情页</p>
      <div class="divider"><span>梦里不知身是客，一晌贪欢</span></div>
    </header>

    <!-- Admin Panel -->
    <section class="panel" id="adminPanel" aria-label="admin">
      <div class="panelTop">
        <div>
          <h2>管理面板</h2>
          <p>点击编辑 OC 信息 [ 仅限本地储存 ] </p>
        </div>
      </div>

      <div class="form" aria-label="form">
        <div class="field">
          <label for="ocName">名字</label>
          <input id="ocName" placeholder="例如：张蓝" />
        </div>

        <div class="field">
          <label for="ocTag">标签（可选）</label>
          <input id="ocTag" placeholder="例如：玄都 / 昙庭 / 浮陆" />
        </div>

        <div class="field poem-field">
          <label for="ocPoem">一句话描述（可选）</label>
          <input id="ocPoem" placeholder="例如：- 人生如寄，多忧何为 -" />
        </div>

        <div class="field">
          <label for="ocImage">图片（上传）</label>
          <input id="ocImage" type="file" accept="image/*" />
        </div>

        <div class="field">
          <label for="ocPick">当前编辑的 OC</label>
          <select id="ocPick"></select>
        </div>
      </div>

      <div class="rowBtns">
        <button class="btn" id="btnSave" type="button">保存修改</button>
      </div>

      <div class="mini">
        <span>提示：“导出数据”可跨设备保存，请联系管理员。</span>
        <span class="mono" id="storageHint">storage: characters_v1</span>
      </div>
    </section>

    <!-- Grid -->
    <section class="grid" id="grid" aria-label="characters grid"></section>
  </div>

  <script>
    // ===== Storage key =====
    const KEY = 'characters_v1';

    // ===== Default placeholders (first time only) =====
    const DEFAULTS = [
      {
        id: cryptoId(),
        name: "还朔",
        tag: "昙庭-浮陆",
        poem: "- 今宵剩把银缸照，相逢犹恐是梦中 -",
        img: makePlaceholder("还朔")
      },
      {
        id: cryptoId(),
        name: "羲姮",
        tag: "昙庭-凌虚",
        poem: "- 披石兰兮带杜衡，折芳馨兮遗所思 -",
        img: makePlaceholder("从羲")
      },
      {
        id: cryptoId(),
        name: "迟樾",
        tag: "玄都",
        poem: "- 旧游无处不堪寻 -",
        img: makePlaceholder("迟樾")
      },
      {
        id: cryptoId(),
        name: "芜青",
        tag: "凌虚",
        poem: "- 江南无所有，聊赠一枝春 -",
        img: makePlaceholder("芜青")
      },
      {
        id: cryptoId(),
        name: "曜衡",
        tag: "凌虚",
        poem: "-  -",
        img: makePlaceholder("曜衡")
      },
      {
        id: cryptoId(),
        name: "祝飞红",
        tag: "浮陆",
        poem: "- 忽于水底见青山 -",
        img: makePlaceholder("祝飞红")
      },
      {
        id: cryptoId(),
        name: "江行",
        tag: "昙庭",
        poem: "- 人海阔，无日不风波 -",
        img: makePlaceholder("江行")
      },
    ];

    // ===== State =====
    let items = load() ?? null;
    let isAdminMode = false; // 标记是否处于管理模式
    if(!items){
      items = DEFAULTS;
      save(items);
    }

    // ===== DOM =====
    const grid = document.getElementById('grid');
    const headerDesc = document.getElementById('headerDesc');

    const adminPanel = document.getElementById('adminPanel');
    const btnToggleAdmin = document.getElementById('btnToggleAdmin');
    const btnExport = document.getElementById('btnExport');

    const ocName = document.getElementById('ocName');
    const ocTag = document.getElementById('ocTag');
    const ocPoem = document.getElementById('ocPoem');
    const ocImage = document.getElementById('ocImage');
    const ocPick = document.getElementById('ocPick');

    const btnSave = document.getElementById('btnSave');

    // ===== UI =====
    // 切换管理模式
    btnToggleAdmin.addEventListener('click', () => {
      isAdminMode = !isAdminMode;
      adminPanel.classList.toggle('show', isAdminMode);
      btnToggleAdmin.textContent = isAdminMode ? '退出管理' : '管理';
      
      // 更新提示文字
      headerDesc.textContent = isAdminMode 
        ? "点击卡片编辑OC信息，点击+添加新OC，点击-删除OC。" 
        : "点击卡片进入人物页（后续我们再做人物详情页）。";
      
      // 重新渲染网格
      render();
    });

    // 导出数据按钮
    btnExport.addEventListener('click', () => {
      try {
        const data = JSON.stringify(items, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `oc-characters-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        
        URL.revokeObjectURL(url);
        alert('数据导出成功！请将此文件更新到GitHub仓库中。');
      } catch (e) {
        alert('导出失败：' + e.message);
      }
    });

    function render(){
      // 渲染OC卡片 + 添加按钮
      let gridHTML = items.map(it => cardHTML(it)).join('');
      // 管理模式下添加+按钮卡片
      if (isAdminMode) {
        gridHTML += `
          <div class="card add-card" id="addCard" aria-label="添加新OC">
            <div class="add-icon">+</div>
          </div>
        `;
      }
      grid.innerHTML = gridHTML;

      // 更新下拉选择列表
      ocPick.innerHTML = items.map(it => `<option value="${it.id}">${escapeHtml(it.name)}${it.tag ? ' · ' + escapeHtml(it.tag) : ''}</option>`).join('');

      // 绑定卡片点击事件
      grid.querySelectorAll('[data-id]').forEach(el => {
        el.addEventListener('click', (e) => {
          // 阻止事件冒泡，避免删除按钮点击时触发卡片编辑
          if (e.target.classList.contains('delete-btn')) return;
          
          const id = el.getAttribute('data-id');
          if (isAdminMode) {
            // 管理模式下：点击卡片选中并填充到编辑表单
            ocPick.value = id;
            fillFormFromPick();
          } else {
            // 非管理模式下：占位的详情页提示
            alert('后续做人物详情页：' + (items.find(x => x.id === id)?.name ?? ''));
          }
        });
      });

      // 绑定删除按钮事件
      grid.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation(); // 阻止冒泡到卡片点击
          const id = btn.getAttribute('data-id');
          deleteOC(id);
        });
      });

      // 绑定添加OC按钮事件
      const addCard = document.getElementById('addCard');
      if (addCard) {
        addCard.addEventListener('click', addNewOC);
      }

      // 初始化表单（选中第一个OC）
      if(items.length && ocPick.options.length > 0 && !ocPick.value){
        ocPick.value = items[0].id;
        fillFormFromPick();
      }
    }

    function cardHTML(it){
      return `
        <div class="card" data-id="${it.id}" aria-label="${escapeHtml(it.name)}">
          ${isAdminMode ? `<div class="delete-btn" data-id="${it.id}">-</div>` : ''}
          <div class="thumb">
            <img src="${it.img}" alt="${escapeHtml(it.name)}" loading="lazy" />
          </div>
          <div class="name">
            <div class="name-row">
              <b>${escapeHtml(it.name)}</b>
              <span class="tag">${escapeHtml(it.tag || "OC")}</span>
            </div>
            ${it.poem ? `<div class="poem">${escapeHtml(it.poem)}</div>` : ''}
          </div>
        </div>
      `;
    }

    // 从选中的OC填充表单
    function fillFormFromPick(){
      const it = items.find(x => x.id === ocPick.value);
      if(!it) return;
      ocName.value = it.name || '';
      ocTag.value = it.tag || '';
      ocPoem.value = it.poem || '';
      ocImage.value = ''; // 文件输入框无法编程设置值
    }

    // OC选择变更时更新表单
    ocPick.addEventListener('change', fillFormFromPick);

    // ===== 核心操作函数 =====
    // 添加新OC
    function addNewOC() {
      // 创建新OC对象
      const newOC = {
        id: cryptoId(),
        name: "新角色",
        tag: "未分类",
        poem: "",
        img: makePlaceholder("新角色")
      };

      // 添加到数组并保存
      items.unshift(newOC);
      save(items);
      
      // 更新UI
      render();
      ocPick.value = newOC.id;
      fillFormFromPick();
      
      // 聚焦到名字输入框，方便编辑
      ocName.focus();
      ocName.select();
    }

    // 删除OC
    function deleteOC(id) {
      const it = items.find(x => x.id === id);
      if(!it) return;

      // 确认删除弹窗
      const confirmDelete = confirm(`确定删除该角色「${it.name}」吗？`);
      if(!confirmDelete) return;

      // 从数组中移除并保存
      items = items.filter(x => x.id !== id);
      save(items);
      
      // 更新UI
      render();
      
      // 如果删除后还有OC，选中第一个
      if (items.length > 0 && ocPick.options.length > 0) {
        ocPick.value = items[0].id;
        fillFormFromPick();
      } else {
        // 清空表单
        ocName.value = '';
        ocTag.value = '';
        ocPoem.value = '';
        ocImage.value = '';
      }
    }

    // 保存OC修改
    btnSave.addEventListener('click', async () => {
      const id = ocPick.value;
      const it = items.find(x => x.id === id);
      if(!it) {
        alert('请先选择要编辑的OC');
        return;
      }

      const name = ocName.value.trim();
      if(!name){
        alert('名字不能为空');
        ocName.focus();
        return;
      }
      
      // 更新OC信息
      it.name = name;
      it.tag = ocTag.value.trim();
      it.poem = ocPoem.value.trim();

      // 处理图片上传
      const newImg = await readImageAsDataURL(ocImage.files?.[0]);
      if(newImg) it.img = newImg;

      // 保存并更新UI
      save(items);
      render();
      ocPick.value = id;
      fillFormFromPick();
      
      alert(`「${it.name}」的信息已保存！`);
    });

    // ===== 存储相关 =====
    function load(){
      try{
        const raw = localStorage.getItem(KEY);
        if(!raw) return null;
        const data = JSON.parse(raw);
        if(!Array.isArray(data)) return null;
        return data;
      }catch{
        return null;
      }
    }
    
    function save(data){
      localStorage.setItem(KEY, JSON.stringify(data));
    }

    // ===== 工具函数 =====
    function cryptoId(){
      // 生成唯一ID
      if(window.crypto?.getRandomValues){
        const arr = new Uint32Array(3);
        crypto.getRandomValues(arr);
        return Array.from(arr).map(x => x.toString(16)).join('');
      }
      return 'id_' + Math.random().toString(16).slice(2) + Date.now().toString(16);
    }

    function escapeHtml(s){
      // HTML转义
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function readImageAsDataURL(file){
      // 读取图片为DataURL
      return new Promise(resolve => {
        if(!file){
          resolve(null);
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(file);
      });
    }

    function makePlaceholder(text){
      // 生成SVG占位图
      const t = (text || 'OC').slice(0, 6);
      const svg =
`<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="rgba(143,184,168,0.22)"/>
      <stop offset="1" stop-color="rgba(214,179,106,0.18)"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="rgba(10,12,18,1)"/>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#g)" opacity="0.9"/>
  <circle cx="740" cy="120" r="88" fill="rgba(255,255,255,0.08)"/>
  <circle cx="180" cy="460" r="120" fill="rgba(255,255,255,0.06)"/>
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="Songti SC, STSong, SimSun, serif" font-size="64"
        fill="rgba(255,255,255,0.88)" letter-spacing="10">${escapeXml(t)}</text>
  <text x="50%" y="64%" text-anchor="middle" dominant-baseline="middle"
        font-family="Songti SC, STSong, SimSun, serif" font-size="22"
        fill="rgba(255,255,255,0.65)" letter-spacing="6">未上传图片</text>
</svg>`;
      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }

    function escapeXml(s){
      // XML转义
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&apos;");
    }

    // 初始化渲染
    render();
  </script>
</body>
</html>
