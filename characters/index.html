<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>人物 · 几度春秋</title>
  <meta name="description" content="OC 人物设定集合" />

  <style>
    :root{
      --bg0:#070a10;
      --gold:#d6b36a;
      --jade:#8fb8a8;
      --line2:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.72);
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --radius: 20px;
    }
    *{ box-sizing:border-box; }
    html, body{
      height:100%;
      font-family: "Songti SC","STSong","SimSun","NSimSun",serif !important;
    }
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 15% 0%, rgba(143,184,168,.12), transparent 55%),
        radial-gradient(900px 600px at 85% 10%, rgba(214,179,106,.12), transparent 58%),
        linear-gradient(180deg, var(--bg0), #06070b 60%, #06070b);
      overflow-x:hidden;
    }
    a{ color:inherit; text-decoration:none; }

    /* Top bar */
    .wrap{
      width:min(1100px, 100%);
      margin: 0 auto;
      padding: 22px 16px 50px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      box-shadow: 0 18px 50px rgba(0,0,0,.30);
      backdrop-filter: blur(10px);
    }
    .left{
      display:flex; align-items:center; gap:10px; min-width:0;
    }
    .seal{
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.18);
      background:
        radial-gradient(circle at 30% 30%, rgba(214,179,106,.30), transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(143,184,168,.24), transparent 55%),
        rgba(255,255,255,.05);
      display:grid; place-items:center;
      flex: 0 0 auto;
    }
    .title{
      line-height:1.1; min-width:0;
    }
    .title b{
      letter-spacing:.20em;
      font-size: 13px;
      font-weight: 800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:block;
    }
    .title small{
      display:block;
      margin-top:3px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing:.10em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap: wrap;
      justify-content:flex-end;
      align-items:center;
    }
    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 12px;
      letter-spacing:.08em;
      cursor:pointer;
      user-select:none;
      transition: transform .15s ease, background .15s ease, border-color .15s ease, color .15s ease;
    }
    .pill:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.07);
      border-color: rgba(255,255,255,.22);
      color: var(--text);
    }

    /* Header */
    .header{
      text-align:center;
      padding: 20px 6px 0;
    }
    .header h1{
      margin: 18px 0 8px;
      font-size: clamp(34px, 5vw, 56px);
      letter-spacing: .22em;
      font-weight: 900;
      text-shadow:
        0 0 18px rgba(214,179,106,.14),
        0 20px 60px rgba(0,0,0,.55);
    }
    .header p{
      margin:0;
      color: var(--muted);
      letter-spacing: .18em;
      font-size: 13px;
      line-height: 1.9;
    }
    .divider{
      margin: 18px auto 0;
      width: min(720px, 92%);
      display:flex;
      align-items:center;
      gap:14px;
      color: rgba(255,255,255,.55);
    }
    .divider::before,
    .divider::after{
      content:"";
      height:1px;
      flex:1;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.26), transparent);
    }
    .divider span{
      font-size: 12px;
      letter-spacing:.18em;
      opacity:.92;
      white-space:nowrap;
    }

    /* Grid */
    .grid{
      margin-top: 18px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 980px){ .grid{ grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 720px){ .grid{ grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 420px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      border: 1px solid rgba(255,255,255,.14);
      border-radius: var(--radius);
      background: rgba(10,12,18,.40);
      overflow:hidden;
      box-shadow: 0 14px 40px rgba(0,0,0,.25);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
      position:relative;
      min-height: 230px;
    }
    .card:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.24);
      background: rgba(10,12,18,.55);
    }
    .thumb{
      height: 160px;
      position:relative;
      background: rgba(255,255,255,.06);
      overflow:hidden;
    }
    .thumb img{
      width:100%; height:100%;
      object-fit:cover;
      display:block;
      filter: saturate(95%) contrast(105%);
      transform: scale(1.03);
    }
    .thumb::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,.00), rgba(0,0,0,.60));
      pointer-events:none;
    }
    .name{
      padding: 12px 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .name b{
      letter-spacing:.18em;
      font-size: 14px;
      font-weight: 900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tag{
      font-size: 11px;
      letter-spacing:.10em;
      color: rgba(255,255,255,.70);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      padding: 6px 10px;
      border-radius: 999px;
      white-space:nowrap;
      flex: 0 0 auto;
    }

    /* Admin panel */
    .panel{
      margin-top: 16px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius);
      background: rgba(255,255,255,.04);
      padding: 14px;
      display:none;
    }
    .panel.show{ display:block; }
    .panelTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .panelTop h2{
      margin:0;
      font-size: 13px;
      letter-spacing: .18em;
      font-weight: 900;
      color: rgba(255,255,255,.92);
    }
    .panelTop p{
      margin:0;
      color: rgba(255,255,255,.60);
      font-size: 12px;
      letter-spacing:.10em;
      line-height: 1.7;
    }
    .form{
      margin-top: 12px;
      display:grid;
      grid-template-columns: 1.2fr 1.2fr .8fr;
      gap: 10px;
    }
    @media (max-width: 820px){
      .form{ grid-template-columns: 1fr; }
    }
    .field{
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      background: rgba(10,12,18,.35);
      padding: 10px 10px 8px;
    }
    .field label{
      display:block;
      font-size: 11px;
      color: rgba(255,255,255,.70);
      letter-spacing:.12em;
      margin-bottom: 6px;
    }
    .field input, .field select{
      width:100%;
      background: transparent;
      border: none;
      outline:none;
      color: rgba(255,255,255,.92);
      font-size: 13px;
      letter-spacing:.08em;
      font-family: inherit;
    }
    .rowBtns{
      display:flex;
      gap:8px;
      flex-wrap: wrap;
      align-items:center;
      justify-content:flex-start;
      margin-top: 10px;
    }
    .btn{
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.90);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      letter-spacing:.10em;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.24);
    }
    .danger{
      border-color: rgba(255,120,120,.25);
      background: rgba(255,120,120,.06);
    }
    .danger:hover{
      border-color: rgba(255,120,120,.40);
      background: rgba(255,120,120,.10);
    }

    .mini{
      margin-top: 10px;
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      align-items:center;
      justify-content:space-between;
      border-top: 1px solid rgba(255,255,255,.10);
      padding-top: 10px;
    }
    .mini span{
      color: rgba(255,255,255,.65);
      font-size: 12px;
      letter-spacing:.08em;
      line-height: 1.7;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-size: 11px;
      color: rgba(255,255,255,.60);
      letter-spacing: .04em;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="left">
        <div class="seal" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 2l2.2 6.2L21 10l-5 3.7L17.8 20 12 16.7 6.2 20 8 13.7 3 10l6.8-1.8L12 2z"
              stroke="rgba(255,255,255,.85)" stroke-width="1.2" />
          </svg>
        </div>
        <div class="title">
          <b>人物</b>
          <small>OC 集合 · 图片 + 名字 · 可本地增删改</small>
        </div>
      </div>

      <div class="actions">
        <a class="pill" href="../index.html">返回首页</a>
        <button class="pill" id="btnToggleAdmin" type="button">管理</button>
      </div>
    </div>

    <header class="header">
      <h1>人物</h1>
      <p>点击卡片进入人物页（后续我们再做人物详情页）。</p>
      <div class="divider"><span>山月不知心里事</span></div>
    </header>

    <!-- Admin Panel -->
    <section class="panel" id="adminPanel" aria-label="admin">
      <div class="panelTop">
        <div>
          <h2>管理面板</h2>
          <p>新增 / 编辑 / 删除 OC（数据存浏览器 localStorage，适合快速维护）。</p>
        </div>
      </div>

      <div class="form" aria-label="form">
        <div class="field">
          <label for="ocName">名字</label>
          <input id="ocName" placeholder="例如：姜朔妜 / 还朔" />
        </div>

        <div class="field">
          <label for="ocTag">标签（可选）</label>
          <input id="ocTag" placeholder="例如：玄都 / 昙庭 / 主角" />
        </div>

        <div class="field">
          <label for="ocImage">图片（上传）</label>
          <input id="ocImage" type="file" accept="image/*" />
        </div>

        <div class="field" style="grid-column:1 / -1;">
          <label for="ocPick">选择要编辑/删除的 OC</label>
          <select id="ocPick"></select>
        </div>
      </div>

      <div class="rowBtns">
        <button class="btn" id="btnAdd" type="button">新增</button>
        <button class="btn" id="btnUpdate" type="button">保存编辑</button>
        <button class="btn danger" id="btnDelete" type="button">删除</button>
      </div>

      <div class="mini">
        <span>提示：你也可以把数据导出成 JSON，然后提交到 GitHub（就能跨设备同步）。</span>
        <span class="mono" id="storageHint">storage: characters_v1</span>
      </div>
    </section>

    <!-- Grid -->
    <section class="grid" id="grid" aria-label="characters grid"></section>
  </div>

  <script>
    // ===== Storage key =====
    const KEY = 'characters_v1';

    // ===== Default placeholders (first time only) =====
    const DEFAULTS = [
      {
        id: cryptoId(),
        name: "还朔",
        tag: "主线",
        img: makePlaceholder("还朔")
      },
      {
        id: cryptoId(),
        name: "羲姮",
        tag: "昙庭",
        img: makePlaceholder("羲姮")
      },
      {
        id: cryptoId(),
        name: "迟樾",
        tag: "玄都",
        img: makePlaceholder("迟樾")
      },
      {
        id: cryptoId(),
        name: "芜青",
        tag: "前尘",
        img: makePlaceholder("芜青")
      },
    ];

    // ===== State =====
    let items = load() ?? null;
    if(!items){
      items = DEFAULTS;
      save(items);
    }

    // ===== DOM =====
    const grid = document.getElementById('grid');

    const adminPanel = document.getElementById('adminPanel');
    const btnToggleAdmin = document.getElementById('btnToggleAdmin');

    const ocName = document.getElementById('ocName');
    const ocTag = document.getElementById('ocTag');
    const ocImage = document.getElementById('ocImage');
    const ocPick = document.getElementById('ocPick');

    const btnAdd = document.getElementById('btnAdd');
    const btnUpdate = document.getElementById('btnUpdate');
    const btnDelete = document.getElementById('btnDelete');

    // ===== UI =====
    btnToggleAdmin.addEventListener('click', () => {
      adminPanel.classList.toggle('show');
      btnToggleAdmin.textContent = adminPanel.classList.contains('show') ? '收起管理' : '管理';
    });

    function render(){
      // grid
      grid.innerHTML = items.map(it => cardHTML(it)).join('');

      // pick list
      ocPick.innerHTML = items.map(it => `<option value="${it.id}">${escapeHtml(it.name)}${it.tag ? ' · ' + escapeHtml(it.tag) : ''}</option>`).join('');

      // click handlers (enter detail later)
      grid.querySelectorAll('[data-id]').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.getAttribute('data-id');
          // 先占位：将来我们做 characters/<id>.html 或 ?id=xxx
          alert('后续做人物详情页：' + (items.find(x => x.id === id)?.name ?? ''));
        });
      });

      // load selected into form
      if(items.length){
        if(!items.find(x => x.id === ocPick.value)){
          ocPick.value = items[0].id;
        }
        fillFormFromPick();
      }
    }

    function cardHTML(it){
      return `
        <a class="card" href="javascript:void(0)" data-id="${it.id}" aria-label="${escapeHtml(it.name)}">
          <div class="thumb">
            <img src="${it.img}" alt="${escapeHtml(it.name)}" loading="lazy" />
          </div>
          <div class="name">
            <b>${escapeHtml(it.name)}</b>
            <span class="tag">${escapeHtml(it.tag || "OC")}</span>
          </div>
        </a>
      `;
    }

    function fillFormFromPick(){
      const it = items.find(x => x.id === ocPick.value);
      if(!it) return;
      ocName.value = it.name || '';
      ocTag.value = it.tag || '';
      ocImage.value = ''; // file input cannot be set programmatically
    }

    ocPick.addEventListener('change', fillFormFromPick);

    // ===== Actions =====
    btnAdd.addEventListener('click', async () => {
      const name = ocName.value.trim();
      if(!name){
        alert('请先填名字');
        return;
      }
      const tag = ocTag.value.trim();
      const img = await readImageAsDataURL(ocImage.files?.[0]) || makePlaceholder(name);

      items.unshift({
        id: cryptoId(),
        name,
        tag,
        img
      });

      save(items);
      render();
      // auto select newest
      ocPick.value = items[0].id;
      fillFormFromPick();
    });

    btnUpdate.addEventListener('click', async () => {
      const id = ocPick.value;
      const it = items.find(x => x.id === id);
      if(!it) return;

      const name = ocName.value.trim();
      if(!name){
        alert('名字不能为空');
        return;
      }
      it.name = name;
      it.tag = ocTag.value.trim();

      const newImg = await readImageAsDataURL(ocImage.files?.[0]);
      if(newImg) it.img = newImg;

      save(items);
      render();
      ocPick.value = id;
      fillFormFromPick();
    });

    btnDelete.addEventListener('click', () => {
      const id = ocPick.value;
      const it = items.find(x => x.id === id);
      if(!it) return;

      const ok = confirm(`确定删除「${it.name}」吗？`);
      if(!ok) return;

      items = items.filter(x => x.id !== id);
      save(items);
      render();
    });

    // ===== Storage =====
    function load(){
      try{
        const raw = localStorage.getItem(KEY);
        if(!raw) return null;
        const data = JSON.parse(raw);
        if(!Array.isArray(data)) return null;
        return data;
      }catch{
        return null;
      }
    }
    function save(data){
      localStorage.setItem(KEY, JSON.stringify(data));
    }

    // ===== Helpers =====
    function cryptoId(){
      // stable enough for this use
      if(window.crypto?.getRandomValues){
        const arr = new Uint32Array(3);
        crypto.getRandomValues(arr);
        return Array.from(arr).map(x => x.toString(16)).join('');
      }
      return 'id_' + Math.random().toString(16).slice(2) + Date.now().toString(16);
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function readImageAsDataURL(file){
      return new Promise(resolve => {
        if(!file){
          resolve(null);
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(file);
      });
    }

    function makePlaceholder(text){
      // simple SVG placeholder (no extra assets)
      const t = (text || 'OC').slice(0, 6);
      const svg =
`<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="rgba(143,184,168,0.22)"/>
      <stop offset="1" stop-color="rgba(214,179,106,0.18)"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="rgba(10,12,18,1)"/>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#g)" opacity="0.9"/>
  <circle cx="740" cy="120" r="88" fill="rgba(255,255,255,0.08)"/>
  <circle cx="180" cy="460" r="120" fill="rgba(255,255,255,0.06)"/>
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="Songti SC, STSong, SimSun, serif" font-size="64"
        fill="rgba(255,255,255,0.88)" letter-spacing="10">${escapeXml(t)}</text>
  <text x="50%" y="64%" text-anchor="middle" dominant-baseline="middle"
        font-family="Songti SC, STSong, SimSun, serif" font-size="22"
        fill="rgba(255,255,255,0.65)" letter-spacing="6">未上传图片</text>
</svg>`;
      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }

    function escapeXml(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&apos;");
    }

    // init
    render();
  </script>
</body>
</html>
